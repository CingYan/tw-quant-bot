<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股量化交易系統 - 儀表板</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }
        
        header h1 {
            color: #58a6ff;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        
        .card h2 {
            color: #58a6ff;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        
        .signal-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #0d1117;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .signal-label {
            color: #8b949e;
            font-size: 14px;
        }
        
        .signal-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        .signal-green {
            color: #3fb950;
        }
        
        .signal-red {
            color: #f85149;
        }
        
        .signal-gray {
            color: #8b949e;
        }
        
        .chart-container {
            width: 100%;
            height: 400px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
        }
        
        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
        }
        
        .metric-item:last-child {
            border-bottom: none;
        }
        
        .metric-label {
            color: #8b949e;
        }
        
        .metric-value {
            font-weight: bold;
            color: #58a6ff;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .error {
            color: #f85149;
            padding: 20px;
            background: #3c1618;
            border-radius: 6px;
            margin: 20px 0;
        }
        
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        
        button:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 台股量化交易系統 - 儀表板</h1>
            <p>台積電 2330.TW | 即時監控 & ML 預測</p>
        </header>
        
        <!-- 最新訊號 -->
        <div class="card">
            <h2>🎯 最新交易訊號</h2>
            <div id="latest-signal" class="loading">載入中...</div>
            <button onclick="refreshSignal()">🔄 重新整理</button>
        </div>
        
        <!-- 價格走勢圖 -->
        <div class="chart-container">
            <div id="price-chart" class="loading">載入價格走勢圖...</div>
        </div>
        
        <!-- 特徵重要性 -->
        <div class="chart-container">
            <div id="feature-importance" class="loading">載入特徵重要性...</div>
        </div>
        
        <!-- 雙欄佈局 -->
        <div class="grid">
            <!-- 模型指標 -->
            <div class="card">
                <h2>📈 模型效能指標</h2>
                <div id="model-metrics" class="loading">載入中...</div>
            </div>
            
            <!-- 訊號歷史 -->
            <div class="card">
                <h2>📜 近期訊號記錄</h2>
                <div id="signal-history" class="loading">載入中...</div>
            </div>
        </div>
    </div>
    
    <script>
        // 載入最新訊號
        async function loadLatestSignal() {
            try {
                const response = await fetch('/api/latest_signal');
                const data = await response.json();
                
                const signalEmoji = {
                    1: '🟢',
                    '-1': '🔴',
                    0: '⚪'
                }[data.signal] || '⚪';
                
                const signalClass = {
                    1: 'signal-green',
                    '-1': 'signal-red',
                    0: 'signal-gray'
                }[data.signal] || 'signal-gray';
                
                document.getElementById('latest-signal').innerHTML = `
                    <div class="signal-box">
                        <span class="signal-label">日期</span>
                        <span class="signal-value">${data.date}</span>
                    </div>
                    <div class="signal-box">
                        <span class="signal-label">收盤價</span>
                        <span class="signal-value">${data.close.toFixed(2)} TWD</span>
                    </div>
                    <div class="signal-box">
                        <span class="signal-label">綜合訊號</span>
                        <span class="signal-value ${signalClass}">${signalEmoji} ${data.recommendation}</span>
                    </div>
                    <div class="signal-box">
                        <span class="signal-label">技術分析分數</span>
                        <span class="signal-value">${data.technical_score}</span>
                    </div>
                    <div class="signal-box">
                        <span class="signal-label">ML 上漲機率</span>
                        <span class="signal-value">${(data.ml_proba_up * 100).toFixed(2)}%</span>
                    </div>
                    <div class="signal-box">
                        <span class="signal-label">RSI(14)</span>
                        <span class="signal-value">${data.rsi_14.toFixed(2)}</span>
                    </div>
                    <div class="signal-box">
                        <span class="signal-label">MA5/MA20</span>
                        <span class="signal-value">${data.ma_5_20_cross ? '金叉 ✓' : '死叉 ✗'}</span>
                    </div>
                `;
            } catch (error) {
                document.getElementById('latest-signal').innerHTML = `
                    <div class="error">載入失敗：${error.message}</div>
                `;
            }
        }
        
        // 載入價格走勢圖
        async function loadPriceChart() {
            try {
                const response = await fetch('/api/price_chart');
                const data = await response.json();
                Plotly.newPlot('price-chart', data.data, data.layout);
            } catch (error) {
                document.getElementById('price-chart').innerHTML = `
                    <div class="error">載入失敗：${error.message}</div>
                `;
            }
        }
        
        // 載入特徵重要性
        async function loadFeatureImportance() {
            try {
                const response = await fetch('/api/feature_importance');
                const data = await response.json();
                Plotly.newPlot('feature-importance', data.data, data.layout);
            } catch (error) {
                document.getElementById('feature-importance').innerHTML = `
                    <div class="error">載入失敗：${error.message}</div>
                `;
            }
        }
        
        // 載入模型指標
        async function loadModelMetrics() {
            try {
                const response = await fetch('/api/model_metrics');
                const data = await response.json();
                
                document.getElementById('model-metrics').innerHTML = `
                    <div class="metric-item">
                        <span class="metric-label">訓練集準確率</span>
                        <span class="metric-value">${(data.train_accuracy * 100).toFixed(2)}%</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">測試集準確率</span>
                        <span class="metric-value">${(data.test_accuracy * 100).toFixed(2)}%</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">精確率</span>
                        <span class="metric-value">${(data.test_precision * 100).toFixed(2)}%</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">召回率</span>
                        <span class="metric-value">${(data.test_recall * 100).toFixed(2)}%</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">F1 分數</span>
                        <span class="metric-value">${(data.test_f1 * 100).toFixed(2)}%</span>
                    </div>
                `;
            } catch (error) {
                document.getElementById('model-metrics').innerHTML = `
                    <div class="error">載入失敗：${error.message}</div>
                `;
            }
        }
        
        // 載入訊號歷史
        async function loadSignalHistory() {
            try {
                const response = await fetch('/api/signal_history');
                const data = await response.json();
                
                if (data.length === 0) {
                    document.getElementById('signal-history').innerHTML = '<p>暫無訊號記錄</p>';
                    return;
                }
                
                let html = '';
                data.forEach(item => {
                    const signalEmoji = {
                        1: '🟢',
                        '-1': '🔴'
                    }[item.signal] || '⚪';
                    
                    html += `
                        <div class="metric-item">
                            <span>${item.date}</span>
                            <span>${signalEmoji} ${item.close.toFixed(2)} TWD</span>
                        </div>
                    `;
                });
                
                document.getElementById('signal-history').innerHTML = html;
            } catch (error) {
                document.getElementById('signal-history').innerHTML = `
                    <div class="error">載入失敗：${error.message}</div>
                `;
            }
        }
        
        // 重新整理訊號
        function refreshSignal() {
            loadLatestSignal();
            loadSignalHistory();
        }
        
        // 頁面載入時執行
        window.onload = () => {
            loadLatestSignal();
            loadPriceChart();
            loadFeatureImportance();
            loadModelMetrics();
            loadSignalHistory();
        };
    </script>
</body>
</html>
